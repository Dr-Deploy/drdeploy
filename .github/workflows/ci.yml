name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install
        run: bun install --frozen-lockfile

      # Build the workspace libraries (mcp + skills) before typecheck.
      # @drdeploy/cli imports `@drdeploy/mcp/serve`, which the mcp package's
      # `exports` map resolves to `./dist/serve.js`. That file doesn't exist
      # until tsup runs. Without this step typecheck and the static-binary
      # build both fail with "Could not resolve: @drdeploy/mcp/serve".
      - name: Build workspace libraries
        run: bun run build:libs

      - name: Typecheck
        run: bun run --filter='*' typecheck

      - name: Test
        run: bun test
