name: Release

on:
  push:
    branches: [main]

# Concurrency: only one release at a time. Cancel any in-flight release if
# a new commit lands on main.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Build static binaries for all 4 platforms ────────────────────────────
  build-binaries:
    name: Build CLI binary (${{ matrix.target.name }})
    runs-on: ${{ matrix.target.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: darwin-arm64, runs-on: macos-latest,  bun-target: bun-darwin-arm64 }
          - { name: darwin-x64,   runs-on: macos-latest,  bun-target: bun-darwin-x64 }
          - { name: linux-arm64,  runs-on: ubuntu-latest, bun-target: bun-linux-arm64 }
          - { name: linux-x64,    runs-on: ubuntu-latest, bun-target: bun-linux-x64 }
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install
        run: bun install --frozen-lockfile

      # Same workspace-libs prebuild as CI — @drdeploy/cli imports from
      # @drdeploy/mcp/serve which only exists after tsup runs.
      - name: Build workspace libraries
        run: bun run build:libs

      - name: Build binary
        working-directory: packages/cli
        run: |
          mkdir -p dist
          bun build ./src/index.ts \
            --compile \
            --target=${{ matrix.target.bun-target }} \
            --outfile=./dist/drdeploy-${{ matrix.target.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: drdeploy-${{ matrix.target.name }}
          path: packages/cli/dist/drdeploy-${{ matrix.target.name }}
          retention-days: 7

  # ─── Publish to npm + GitHub Releases via Changesets ──────────────────────
  release:
    name: Release
    needs: build-binaries
    runs-on: ubuntu-latest
    outputs:
      mcp_published: ${{ steps.detect-mcp.outputs.mcp_published }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write    # for npm provenance
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install
        run: bun install --frozen-lockfile

      - name: Download binary artifacts
        uses: actions/download-artifact@v5
        with:
          path: packages/cli/dist
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x packages/cli/dist/drdeploy-*

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun changeset version
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Detect whether @drdeploy/mcp was published
        id: detect-mcp
        if: steps.changesets.outputs.published == 'true'
        run: |
          PUBLISHED=$(jq -r 'any(.[]; .name == "@drdeploy/mcp")' \
            <<< '${{ steps.changesets.outputs.publishedPackages }}')
          echo "mcp_published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "@drdeploy/mcp published this run: $PUBLISHED"

      - name: Attach binaries to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Each published package may have its own tag (e.g., @drdeploy/cli@0.1.0).
          # We attach the static binaries to the cli tag.
          TAG=$(jq -r '.[] | select(.name=="@drdeploy/cli") | "\(.name)@\(.version)"' \
            <<< '${{ steps.changesets.outputs.publishedPackages }}')
          if [ -n "$TAG" ]; then
            echo "Uploading binaries to $TAG..."
            gh release upload "$TAG" packages/cli/dist/drdeploy-* --clobber
          fi

  # ─── Publish to MCP Registry (registry.modelcontextprotocol.io) ───────────
  # Runs only when @drdeploy/mcp publishes to npm. GitHub OIDC auth (no secrets).
  # Source-of-truth: packages/mcp/server.json. We sync .version + .packages[0].version
  # to whatever Changesets just published, then `mcp-publisher publish`.
  mcp-registry:
    name: Publish to MCP Registry
    needs: release
    if: needs.release.outputs.mcp_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # OIDC auth — no PAT needed
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher --version

      - name: Sync server.json version with @drdeploy/mcp
        working-directory: packages/mcp
        run: |
          MCP_VERSION=$(jq -r '.version' package.json)
          jq --arg v "$MCP_VERSION" \
            '.version = $v | .packages[0].version = $v' \
            server.json > server.tmp
          mv server.tmp server.json
          echo "server.json now at version $MCP_VERSION"

      - name: Authenticate via GitHub OIDC
        working-directory: packages/mcp
        run: ${{ github.workspace }}/mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: packages/mcp
        run: ${{ github.workspace }}/mcp-publisher publish
